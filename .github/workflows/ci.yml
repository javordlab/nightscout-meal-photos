name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run linting
      run: npm run lint
    
    - name: Run unit tests
      run: npm run test:unit
    
    - name: Run integration tests
      run: npm run test:integration
    
    - name: Validate sync state
      run: npm run test:validation
    
    - name: Dry run sync
      run: npm run dry-run

  deploy-staging:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to staging
      run: npm run deploy:staging
      env:
        NOTION_KEY: ${{ secrets.NOTION_STAGING_KEY }}
        NOTION_DB_ID: ${{ secrets.NOTION_STAGING_DB_ID }}
        NIGHTSCOUT_URL: ${{ secrets.NIGHTSCOUT_STAGING_URL }}
        NIGHTSCOUT_SECRET: ${{ secrets.NIGHTSCOUT_STAGING_SECRET }}
    
    - name: Validate staging
      run: npm run validate:staging

  deploy-production:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Backup production data
      run: npm run backup
    
    - name: Deploy to production
      run: npm run deploy:production
      env:
        NOTION_KEY: ${{ secrets.NOTION_PROD_KEY }}
        NOTION_DB_ID: ${{ secrets.NOTION_PROD_DB_ID }}
        NIGHTSCOUT_URL: ${{ secrets.NIGHTSCOUT_PROD_URL }}
        NIGHTSCOUT_SECRET: ${{ secrets.NIGHTSCOUT_PROD_SECRET }}
    
    - name: Validate production
      run: npm run validate:production
