<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MySQL Backup Status v1.9 - Health Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .status-badge { @apply px-2 py-1 rounded-full text-xs font-semibold; }
        .bg-glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-900">
    <nav class="bg-white border-b sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fas fa-database text-blue-600 text-2xl"></i>
                <h1 class="text-xl font-bold tracking-tight">Maria Health <span class="text-blue-600">Backup Console v1.9</span></h1>
            </div>
            <div class="text-sm text-gray-500" id="last-updated">Updating...</div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- Token Usage -->
        <div id="usage-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8 hidden"></div>

        <!-- Database Stats -->
        <div id="db-stats-container" class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8 hidden">
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-2xl border shadow-sm">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600">
                            <i class="fas fa-tint"></i>
                        </div>
                        <h2 class="font-bold">Glucose Records</h2>
                    </div>
                    <div class="text-3xl font-black text-gray-800" id="glucose-count">0</div>
                    <div class="text-xs text-gray-400 mt-1 uppercase font-bold tracking-tighter">Total MySQL Entries</div>
                </div>
                <div class="bg-white p-6 rounded-2xl border shadow-sm">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center text-purple-600">
                            <i class="fas fa-sync"></i>
                        </div>
                        <h2 class="font-bold">Notion Syncs</h2>
                    </div>
                    <div class="text-3xl font-black text-gray-800" id="notion-count">0</div>
                    <div class="text-xs text-gray-400 mt-1 uppercase font-bold tracking-tighter">Synchronized Items</div>
                </div>
            </div>
            <div class="lg:col-span-2 bg-white p-6 rounded-2xl border shadow-sm">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="font-bold">Glucose Trend (Pacific Time)</h2>
                    <div class="flex gap-2" id="range-selector">
                        <button onclick="setRange(24)" class="px-3 py-1 text-[10px] font-bold uppercase rounded-lg border bg-blue-600 text-white" data-range="24">24h</button>
                        <button onclick="setRange(72)" class="px-3 py-1 text-[10px] font-bold uppercase rounded-lg border bg-white text-gray-500" data-range="72">72h</button>
                        <button onclick="setRange(168)" class="px-3 py-1 text-[10px] font-bold uppercase rounded-lg border bg-white text-gray-500" data-range="168">1w</button>
                    </div>
                </div>
                <div class="h-64">
                    <canvas id="glucoseTrendChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Sync History (Growth) -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
            <div class="bg-white p-6 rounded-2xl border shadow-sm">
                <h2 class="font-bold mb-4">MySQL Record Growth (Glucose)</h2>
                <div class="h-48"><canvas id="growthChartGlucose"></canvas></div>
            </div>
            <div class="bg-white p-6 rounded-2xl border shadow-sm">
                <h2 class="font-bold mb-4">MySQL Record Growth (Notion)</h2>
                <div class="h-48"><canvas id="growthChartNotion"></canvas></div>
            </div>
        </div>

        <!-- Backups List -->
        <div class="bg-white rounded-2xl border shadow-sm overflow-hidden">
            <div class="px-6 py-4 border-b bg-gray-50 flex justify-between items-center">
                <h2 class="font-bold">Database Snapshots</h2>
                <span class="text-xs bg-gray-200 px-2 py-1 rounded text-gray-600" id="count-label">0 total</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-xs text-gray-500 uppercase">
                        <tr>
                            <th class="px-6 py-3">Created (Pacific)</th>
                            <th class="px-6 py-3">Filename</th>
                            <th class="px-6 py-3">Type</th>
                            <th class="px-6 py-3 text-right">Size</th>
                        </tr>
                    </thead>
                    <tbody id="backup-list" class="divide-y"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        let dashboardData = null;
        let charts = {};

        function formatPST(isoStr, options = {}) {
            return new Date(isoStr).toLocaleString('en-US', {
                timeZone: 'America/Los_Angeles',
                ...options
            });
        }

        function setRange(hours) {
            document.querySelectorAll('#range-selector button').forEach(btn => {
                if (parseInt(btn.dataset.range) === hours) {
                    btn.classList.add('bg-blue-600', 'text-white');
                    btn.classList.remove('bg-white', 'text-gray-500');
                } else {
                    btn.classList.remove('bg-blue-600', 'text-white');
                    btn.classList.add('bg-white', 'text-gray-500');
                }
            });
            updateGlucoseChart(hours);
        }

        function updateGlucoseChart(hours) {
            if (!dashboardData || !dashboardData.glucoseTrend) return;
            const cutoff = new Date(Date.now() - hours * 60 * 60 * 1000);
            const filtered = dashboardData.glucoseTrend.filter(p => new Date(p.t) >= cutoff);

            const labels = filtered.map(p => {
                return formatPST(p.t, { hour: '2-digit', minute: '2-digit', hour12: true });
            });

            const data = filtered.map(p => p.v);
            const sorted = [...data].sort((a, b) => a - b);
            const median = sorted[Math.floor(sorted.length / 2)] || 0;

            if (charts.glucose) {
                charts.glucose.data.labels = labels;
                charts.glucose.data.datasets[0].data = data;
                charts.glucose.data.datasets[1].data = Array(data.length).fill(median);
                charts.glucose.update('none');
            } else {
                const ctx = document.getElementById('glucoseTrendChart').getContext('2d');
                charts.glucose = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: 'Glucose (mg/dL)',
                                data: data,
                                borderColor: '#3B82F6',
                                backgroundColor: 'rgba(59, 130, 246, 0.1)',
                                borderWidth: 2,
                                pointRadius: 0,
                                fill: true,
                                tension: 0.4
                            },
                            {
                                label: 'Median',
                                data: Array(data.length).fill(median),
                                borderColor: 'rgba(239, 68, 68, 0.5)',
                                borderWidth: 2,
                                borderDash: [5, 5],
                                pointRadius: 0,
                                fill: false
                            }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { 
                            y: { min: 40, max: 300 }, 
                            x: { 
                                grid: { display: false },
                                ticks: { maxRotation: 0, autoSkip: true, maxTicksLimit: 12 } 
                            } 
                        }
                    }
                });
            }
        }

        async function loadStatus() {
            try {
                const response = await fetch('./data/backups.json?v=' + Date.now());
                dashboardData = await response.json();
                const data = dashboardData;
                
                document.getElementById('last-updated').textContent = `Last sync: ${formatPST(data.lastUpdated)}`;
                document.getElementById('count-label').textContent = `${data.backups.length} snapshots tracked`;
                
                const usageContainer = document.getElementById('usage-container');
                if (data.tokenUsage) {
                    usageContainer.classList.remove('hidden');
                    usageContainer.innerHTML = data.tokenUsage.map(u => `
                        <a href="${u.link || '#'}" target="_blank" class="bg-white p-5 rounded-2xl border shadow-sm block">
                            <div class="text-xs font-bold text-gray-400 uppercase mb-1">${u.platform}</div>
                            <div class="text-2xl font-black text-gray-800">${((u.realTokens || 0) / 1000000).toFixed(1)}M</div>
                            <div class="text-[10px] text-gray-400 font-medium">TOKENS USED</div>
                        </a>
                    `).join('');
                }

                if (data.database) {
                    document.getElementById('db-stats-container').classList.remove('hidden');
                    document.getElementById('glucose-count').textContent = data.database.glucose.toLocaleString();
                    document.getElementById('notion-count').textContent = data.database.notion.toLocaleString();
                }

                updateGlucoseChart(24);

                if (data.syncHistory) {
                    const labels = data.syncHistory.map(h => h.date.split('-').slice(1).join('/'));
                    const commonOptions = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } };
                    
                    new Chart(document.getElementById('growthChartGlucose'), {
                        type: 'line', data: { labels, datasets: [{ data: data.syncHistory.map(h => h.glucose), borderColor: '#3B82F6', fill: true, tension: 0.3 }] },
                        options: commonOptions
                    });
                    new Chart(document.getElementById('growthChartNotion'), {
                        type: 'line', data: { labels, datasets: [{ data: data.syncHistory.map(h => h.notion), borderColor: '#A855F7', fill: true, tension: 0.3 }] },
                        options: commonOptions
                    });
                }

                document.getElementById('backup-list').innerHTML = data.backups.map(b => `
                    <tr>
                        <td class="px-6 py-4 text-sm font-medium">${formatPST(b.created)}</td>
                        <td class="px-6 py-4 text-sm text-gray-600 font-mono">${b.filename}</td>
                        <td class="px-6 py-4"><span class="px-2 py-1 rounded-full text-[10px] font-bold uppercase ${b.type.includes('Daily') ? 'bg-blue-50 text-blue-700' : 'bg-purple-50 text-purple-700'}">${b.type}</span></td>
                        <td class="px-6 py-4 text-right text-sm font-mono text-gray-500">${b.size}</td>
                    </tr>
                `).join('');

            } catch (error) { console.error(error); }
        }
        loadStatus();
    </script>
</body>
</html>
