<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meal Photos — Notion Feed</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --card-bg: #16213e;
      --text: #e0e0e0;
      --text-muted: #8a8a9a;
      --accent: #0f3460;
      --green: #4ecca3;
      --orange: #f5a623;
      --border: #2a2a4a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }

    .header {
      text-align: center;
      padding: 20px 0 30px;
    }

    .header h1 {
      font-size: 1.8em;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .header .subtitle {
      color: var(--text-muted);
      font-size: 0.95em;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .controls select, .controls input, .controls button {
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      font-size: 0.9em;
    }

    .controls button {
      background: var(--orange);
      color: #1a1a2e;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }

    .controls button:hover { opacity: 0.85; }

    .timeline {
      max-width: 720px;
      margin: 0 auto;
    }

    .day-label {
      font-size: 1.1em;
      font-weight: 600;
      color: var(--orange);
      padding: 16px 0 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .meal-card {
      background: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      transition: transform 0.15s;
    }

    .meal-card img {
      width: 100%;
      max-height: 400px;
      object-fit: cover;
      cursor: pointer;
      display: block;
    }

    .meal-card .info {
      padding: 16px;
    }

    .meal-card .time {
      font-size: 0.85em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .meal-card .description {
      font-size: 1.05em;
      line-height: 1.4;
      font-weight: 500;
    }

    .meal-card .impact-row {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.8em;
      font-weight: 600;
    }

    .badge-carbs { background: var(--accent); color: var(--orange); }
    .badge-cals { background: #3d3d5c; color: #b3b3cc; }
    .badge-delta { background: #2c3e50; color: #ecf0f1; border: 1px solid #34495e; }
    .badge-peak { background: #c0392b; color: #fff; }

    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      cursor: zoom-out;
    }

    .lightbox.active { display: flex; }
    .lightbox img { max-width: 95vw; max-height: 95vh; border-radius: 8px; }

    @media (max-width: 600px) {
      body { padding: 12px; }
      .meal-card img { max-height: 280px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📝 Notion Meal Photos</h1>
    <p class="subtitle">Food log synced from the Maria Health Log database in Notion</p>
  </div>

  <div class="controls">
    <input type="date" id="dateFrom" />
    <input type="date" id="dateTo" />
    <button onclick="renderMeals()">Filter</button>
    <a href="index.html" style="color: var(--text-muted); font-size: 0.9em; align-self: center; text-decoration: none;">← Switch to Nightscout Feed</a>
  </div>

  <div class="timeline" id="timeline">
    <div style="text-align:center; padding:60px;">Loading Notion feed...</div>
  </div>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightboxImg" src="" alt="Meal photo" />
  </div>

  <script>
    let allData = [];

    function formatTime(isoStr) {
      return new Date(isoStr).toLocaleString('en-US', {
        timeZone: 'America/Los_Angeles',
        hour: 'numeric', minute: '2-digit', hour12: true
      });
    }

    function formatDate(isoStr) {
      return new Date(isoStr).toLocaleDateString('en-US', {
        timeZone: 'America/Los_Angeles',
        weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
      });
    }

    function openLightbox(src) {
      document.getElementById('lightboxImg').src = src;
      document.getElementById('lightbox').classList.add('active');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    }

    async function loadData() {
      try {
        // Fetch the statically generated JSON file
        const res = await fetch('data/notion_meals.json?t=' + Date.now());
        allData = await res.json();
        
        // Set default date range
        const dates = allData.map(m => m.date.split('T')[0]);
        if (dates.length > 0) {
            document.getElementById('dateTo').value = dates[0];
            document.getElementById('dateFrom').value = dates[dates.length-1];
        }

        renderMeals();
      } catch (err) {
        document.getElementById('timeline').innerHTML = '<div style="text-align:center; padding:60px; color:var(--orange);">Error loading Notion feed. Ensure data has been pushed to GitHub.</div>';
      }
    }

    function renderMeals() {
      const from = document.getElementById('dateFrom').value;
      const to = document.getElementById('dateTo').value;
      const timeline = document.getElementById('timeline');

      const filtered = allData.filter(m => {
          const d = m.date.split('T')[0];
          return d >= from && d <= to;
      });

      if (filtered.length === 0) {
        timeline.innerHTML = '<div style="text-align:center; padding:60px;">No meals found in this range.</div>';
        return;
      }

      const grouped = {};
      filtered.forEach(m => {
        const day = formatDate(m.date);
        if (!grouped[day]) grouped[day] = [];
        grouped[day].push(m);
      });

      let html = '';
      for (const [day, meals] of Object.entries(grouped)) {
        html += `<div class="day-label">${day}</div>`;
        meals.forEach(m => {
          html += `
            <div class="meal-card">
              <img src="${m.photo}" alt="Meal photo" onclick="openLightbox('${m.photo}')" loading="lazy" />
              <div class="info">
                <div class="time">🕐 ${formatTime(m.date)} • ${m.type}</div>
                <div class="description">${m.title}</div>
                <div class="impact-row">
                  ${m.carbs ? `<span class="badge badge-carbs">${m.carbs}g carbs</span>` : ''}
                  ${m.cals ? `<span class="badge badge-cals">${m.cals} kcal</span>` : ''}
                  ${m.delta ? `<span class="badge badge-delta">Rise: +${m.delta} mg/dL</span>` : ''}
                  ${m.peak ? `<span class="badge badge-peak">Peak: ${m.peak}</span>` : ''}
                </div>
              </div>
            </div>
          `;
        });
      }
      timeline.innerHTML = html;
    }

    loadData();
  </script>
</body>
</html>
